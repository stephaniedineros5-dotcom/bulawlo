<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special 💖</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',cursive;
    background:linear-gradient(135deg,#ffd1dc,#fbc2eb,#a18cd1);
    overflow:hidden;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    position:relative;
    background:rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
    max-width:350px;
    animation:fadeIn 1.5s ease;
    transition:0.4s;
}

.card:hover{
    transform:scale(1.03);
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(30px);}
    to{opacity:1;transform:translateY(0);}
}

button{
    padding:12px 22px;
    border-radius:20px;
    border:none;
    margin:10px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.yes{
    background:#ff4d6d;
    color:white;
    box-shadow:0 0 10px #ff4d6d;
}

.no{
    background:#ddd;
}

/* SCREENS */
#pinScreen, #finalScreen{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:black;
    color:white;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

/* FINAL TEXT (NO MORE TYPING) */
#finalText{
    font-size:28px;
    max-width:80%;
    line-height:1.6;
    opacity:0;
    animation:fadeInText 2s forwards;
}

@keyframes fadeInText{
    from{opacity:0;transform:scale(0.95);}
    to{opacity:1;transform:scale(1);}
}

/* GLOW */
.bigText{
    font-size:45px;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px #ff4d6d; }
    to{ text-shadow:0 0 30px #ff99aa, 0 0 50px #ff4d6d; }
}

.heart{
    position:absolute;
    animation:floatUp 6s linear infinite;
}

@keyframes floatUp{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<div class="container">
    <div class="card" id="card">
        <h1>Hi 💖</h1>
        <p>You make my days brighter 🌸</p>

        <p><b>Can I make you smile today? 😊</b></p>
        
        <button class="yes" onclick="startStory()">Yes 💖</button>
        <button class="no" id="noBtn">No 😅</button>

        <p id="result"></p>
    </div>
</div>

<div id="pinScreen">
    <h2>🔐 Enter PIN</h2>
    <p id="hint">(Hint: 1 = I, 4 = Love, 3 = You)</p>
    <input id="pin" type="password">
    <button onclick="checkPin()">Enter</button>
</div>

<div id="finalScreen">
    <h1 id="finalText"></h1>
</div>

<script>

/* STORY */
function startStory(){
    let r=document.getElementById("result");

    let msgs=[
        "Wait… don’t go yet 😳",
        "I want to tell you something...",
        "And I hope you listen...",
        "Because this means a lot to me 💖"
    ];

    let i=0;
    function next(){
        if(i<msgs.length){
            r.innerText=msgs[i];
            i++;
            setTimeout(next,2000);
        }else{
            document.getElementById("pinScreen").style.display="flex";
        }
    }
    next();
}

/* PIN */
let attempts=0;

function checkPin(){
    let val=document.getElementById("pin").value;

    if(val==="143"){
        document.getElementById("pinScreen").style.display="none";
        showFinal();
    }else{
        attempts++;
        if(attempts==1){
            document.getElementById("hint").innerText="Hint: 1 = I, 4 = Love, 3 = You 😳";
        }else{
            alert("Try again 😅");
        }
    }
}

/* FINAL (SIMPLE FADE IN TEXT) */
function showFinal(){
    let f=document.getElementById("finalScreen");
    let text=document.getElementById("finalText");

    f.style.display="flex";

    text.innerHTML = `
    Hey...<br><br>
    I’ve been wanting to say this for a while...<br><br>
    You’ve become someone really important to me.<br>
    You make my days better.<br>
    You make me smile.<br><br>
    And I don’t want to hide it anymore...<br><br>
    I love you 💖<br><br>
    Not just a little...<br>
    But more than I expected.<br><br>
    So please...<br>
    Stay with me a little longer...<br><br>
    Don’t go...<br><br>
    I love you 💖
    `;

    setTimeout(()=>{
        text.classList.add("bigText");
    },2000);
}

let btn = document.getElementById("noBtn");
let card = document.getElementById("card");

let messages = [
    "Are you sure? 😢",
    "That’s kinda sad 💔",
    "Even just a little? 🥺",
    "Please? 😭",
    "Come on 😅"
];

let msgIndex = 0;

// IMPORTANT: make card relative positioning (safe area)
card.style.position = "relative";
btn.style.position = "absolute";

// initial safe position
btn.style.bottom = "15px";
btn.style.right = "15px";

btn.addEventListener("mouseover", moveButton);
btn.addEventListener("touchstart", moveButton);

function moveButton(){
    let result = document.getElementById("result");

    result.innerText = messages[msgIndex];
    msgIndex = (msgIndex + 1) % messages.length;

    let padding = 20;

    let maxX = card.clientWidth - btn.offsetWidth - padding;
    let maxY = card.clientHeight - btn.offsetHeight - padding;

    let x = Math.random() * maxX;
    let y = Math.random() * maxY;

    btn.style.left = x + "px";
    btn.style.top = y + "px";
}
}

/* HEARTS */
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(20+Math.random()*20)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},300);

</script>

</body>
</html>
