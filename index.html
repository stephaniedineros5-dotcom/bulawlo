<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', cursive;
    background: linear-gradient(135deg, #ffd1dc, #fbc2eb, #a18cd1);
    overflow: hidden;
}

/* CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    position: relative;
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    max-width: 360px;
    z-index: 10;
}

/* BUTTONS */
.btns {
    display: flex;
    justify-content: center;
    gap: 10px;
}

button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

.yes {
    background: linear-gradient(45deg,#ff4d6d,#ff8fab);
    color: white;
}

.no {
    background: #eee;
}

/* FINAL SCREEN */
#finalScreen {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: radial-gradient(circle, #000 40%, #ff758c);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    transition:1.5s;
    color:white;
    text-align:center;
}

.show { opacity:1; }

/* BIG TEXT */
.bigText {
    font-size: 45px;
    animation: pop 1s ease forwards;
}

@keyframes pop {
    0% { transform: scale(0); opacity:0; }
    100% { transform: scale(1); opacity:1; }
}

/* PETALS */
.petal {
    position:absolute;
    pointer-events:none;
    animation: fall linear infinite;
}

@keyframes fall {
    0% {transform:translateY(-10vh);opacity:0;}
    50% {opacity:1;}
    100% {transform:translateY(110vh);opacity:0;}
}

/* LIGHTS */
.light {
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.6);
    pointer-events:none;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% {transform:translateY(100vh);}
    100% {transform:translateY(-10vh);}
}
</style>
</head>

<body>

<div class="container">
    <div class="card" id="card">
        <h1>Hi 💖</h1>
        <p>You make my days brighter 🌸</p>

        <p><b>Can I tell you something? 😊</b></p>

        <div class="btns">
            <button class="yes" onclick="startStory()">Yes 💖</button>
            <button class="no" id="noBtn">No 😅</button>
        </div>

        <p id="result"></p>
    </div>
</div>

<div id="finalScreen">
    <h1 id="finalText"></h1>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b6d9b.mp3">
</audio>

<script>

/* TYPE EFFECT */
function typeText(text, delay) {
    let i = 0;
    let el = document.getElementById("result");
    el.innerHTML = "";

    let interval = setInterval(()=>{
        el.innerHTML += text[i];
        i++;
        if(i>=text.length) clearInterval(interval);
    }, delay);
}

/* STORY (MAS MAHABA + HINDI BITIN 💖) */
function startStory(){
    let music = document.getElementById("music");
    music.volume = 0;
    music.play().catch(()=>{});

    let vol = 0;
    let fade = setInterval(()=>{
        if(vol < 0.6){
            vol += 0.02;
            music.volume = vol;
        } else clearInterval(fade);
    },200);

    typeText("Hey... 😳",40);

    setTimeout(()=>typeText("Can I tell you something I've been keeping for a while?",40),2000);
    setTimeout(()=>typeText("I didn’t really know when it started...",40),5000);
    setTimeout(()=>typeText("but somewhere along the way...",40),8000);

    setTimeout(()=>typeText("you became someone really important to me.",40),11000);
    setTimeout(()=>typeText("Like... more than just a normal friend.",40),14000);

    setTimeout(()=>typeText("Talking to you became my favorite part of the day 💬",40),17000);
    setTimeout(()=>typeText("You make things feel lighter, calmer... happier ✨",40),20000);

    setTimeout(()=>typeText("And I don’t usually say things like this but...",40),23000);
    setTimeout(()=>typeText("I’m really really glad I met you 💖",40),26000);

    setTimeout(()=>typeText("Because honestly...",40),29000);
    setTimeout(()=>typeText("life feels a little better with you in it.",40),32000);

    setTimeout(showFinal,35000);
}

/* FINAL (MAS MALAKAS 🎬) */
function showFinal(){
    let final = document.getElementById("finalScreen");
    let text = document.getElementById("finalText");

    final.classList.add("show");

    let lines = [
        "So yeah...",
        "this might sound random...",
        "but I just really wanted you to know",
        "that you matter to me 💖",
        "a lot more than you think",
        "and I hope...",
        "this doesn't change anything",
        "but instead...",
        "makes you smile 😊"
    ];

    let i=0;

    function next(){
        if(i < lines.length){
            text.innerHTML = lines[i];
            i++;
            setTimeout(next,2300);
        } else {
            setTimeout(()=>{
                text.innerHTML = "💖 Stay with me 💖";
                text.className = "bigText";

                setTimeout(()=>{
                    let extra = document.createElement("p");
                    extra.innerText = "because I think I'm starting to really like you 😳";
                    extra.style.marginTop = "20px";
                    document.getElementById("finalScreen").appendChild(extra);
                },2500);

            },2000);
        }
    }

    next();
}

/* NO BUTTON (HOVER = ILAG 😈) */
let btn = document.getElementById("noBtn");
let card = document.getElementById("card");
let result = document.getElementById("result");

btn.addEventListener("mouseover", () => {

    let rect = card.getBoundingClientRect();
    let range = 150;

    btn.style.position = "fixed";
    btn.style.left = rect.left + (Math.random()*range*2-range) + "px";
    btn.style.top = rect.top + (Math.random()*range*2-range) + "px";

    result.innerText = "Hey... why are you choosing no? 😢";
});

</script>

</body>
</html>
