<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special 💖</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',cursive;
    background:linear-gradient(135deg,#ffd1dc,#fbc2eb,#a18cd1);
    overflow:hidden;
}

/* CENTER */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.card{
    position:relative;
    background:rgba(255,255,255,0.9);
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
    max-width:350px;
}

/* BUTTONS */
button{
    padding:10px 20px;
    border-radius:20px;
    border:none;
    margin:10px;
    cursor:pointer;
    font-weight:bold;
}

.yes{background:#ff4d6d;color:white;}
.no{background:#ddd;}

/* PIN SCREEN */
#pinScreen{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:black;
    color:white;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* FINAL */
#finalScreen{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:black;
    color:white;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

#finalText{
    font-size:28px;
    max-width:80%;
}

.bigText{
    font-size:45px;
}

/* HEARTS */
.heart{
    position:absolute;
    animation:floatUp 6s linear infinite;
}

@keyframes floatUp{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<div class="container">
    <div class="card" id="card">
        <h1>Hi 💖</h1>
        <p>You make my days brighter 🌸</p>

        <button class="yes" onclick="startStory()">Yes 💖</button>
        <button class="no" id="noBtn">No 😅</button>

        <p id="result"></p>
    </div>
</div>

<!-- PIN -->
<div id="pinScreen">
    <h2>🔐 Enter PIN</h2>
    <p id="hint">(Hint: our special number)</p>
    <input id="pin" type="password">
    <button onclick="checkPin()">Enter</button>
</div>

<!-- FINAL -->
<div id="finalScreen">
    <h1 id="finalText"></h1>
</div>

<!-- MUSIC -->
<audio id="music" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* STORY */
function startStory(){
    let music=document.getElementById("music");
    music.play().catch(()=>{});

    let r=document.getElementById("result");

    let msgs=[
        "Wait… don’t go yet 😳",
        "I want to tell you something...",
        "and I hope you listen...",
        "because this means a lot to me 💖"
    ];

    let i=0;
    function next(){
        if(i<msgs.length){
            r.innerText=msgs[i];
            i++;
            setTimeout(next,2000);
        }else{
            document.getElementById("pinScreen").style.display="flex";
        }
    }
    next();
}

/* PIN */
let attempts=0;

function checkPin(){
    let val=document.getElementById("pin").value;

    if(val==="143"){
        document.getElementById("pinScreen").style.display="none";
        showFinal();
    }else{
        attempts++;
        if(attempts==1){
            document.getElementById("hint").innerText="Hint: 1=I 4=Love 3=You 😳";
        }else{
            alert("Try again 😅");
        }
    }
}

/* FINAL */
function showFinal(){
    let f=document.getElementById("finalScreen");
    let text=document.getElementById("finalText");

    f.style.display="flex";

    let lines=[
        "Hey...",
        "",
        "I’ve been wanting to say this for a while...",
        "",
        "You became someone really important to me.",
        "",
        "You make my days better.",
        "You make me smile.",
        "",
        "And I don’t want to hide it anymore...",
        "",
        "I love you 💖",
        "",
        "Not just a little...",
        "but more than I expected.",
        "",
        "So please...",
        "",
        "stay with me a little longer...",
        "",
        "Sayang...",
        "",
        "luv yah 💖"
    ];

    let i=0;

    function next(){
        if(i<lines.length){
            text.innerHTML=lines[i];
            i++;
            setTimeout(next,2300);
        }else{
            text.className="bigText";
        }
    }

    next();
}

/* NO BUTTON (FIXED 😈) */
let btn=document.getElementById("noBtn");
let card=document.getElementById("card");

btn.addEventListener("mouseover",()=>{
    let rect=card.getBoundingClientRect();

    let offsetX=Math.random()>0.5?120:-120;
    let offsetY=(Math.random()*100)-50;

    btn.style.position="fixed";
    btn.style.left=(rect.left+offsetX)+"px";
    btn.style.top=(rect.top+offsetY)+"px";
});

/* HEARTS */
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(20+Math.random()*20)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},300);

</script>

</body>
</html>
