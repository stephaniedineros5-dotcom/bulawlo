<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', cursive;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
}

/* Container */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.card {
    background: rgba(255,255,255,0.9);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    max-width: 350px;
    animation: float 3s ease-in-out infinite;
}

h1 { color: #ff4d6d; }
p { color: #444; }

/* Buttons */
button {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    margin: 10px;
    cursor: pointer;
}

.yes { background: #ff4d6d; color: white; }
.no { background: #ddd; }

/* Text */
#result {
    margin-top: 15px;
    font-weight: bold;
    color: #ff4d6d;
}

/* FINAL SCREEN */
#finalScreen {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: none;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    animation: fadeIn 1s ease;
}

#finalScreen h1 {
    font-size: 28px;
}

/* Animations */
@keyframes float {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

/* Hearts */
.heart {
    position: absolute;
    color: #ff4d6d;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(100vh); opacity:0;}
    50% {opacity:1;}
    100% {transform: translateY(-10vh); opacity:0;}
}

/* Flowers */
.flower {
    position: absolute;
    animation: fall 8s linear infinite;
}

@keyframes fall {
    0% {transform: translateY(-10vh);}
    100% {transform: translateY(110vh);}
}
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h1>Hi Bulawlo 💖</h1>
        <p>You make my days a little brighter 🌸✨</p>

        <p><b>Can I make you smile today? 😊</b></p>

        <button class="yes" onclick="startStory()">Yes 💖</button>
        <button class="no" id="noBtn">No 😅</button>

        <p id="result"></p>
    </div>
</div>

<!-- FINAL SCREEN -->
<div id="finalScreen">
    <h1>
        💖 You’re really special to me 💖 <br><br>
        and I’m really glad I have you 😊
    </h1>
</div>

<!-- MUSIC (manual play) -->
<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>

/* TYPING EFFECT */
function typeText(text, delay) {
    let i = 0;
    let result = document.getElementById("result");
    result.innerHTML = "";

    let interval = setInterval(() => {
        result.innerHTML += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
    }, delay);
}

/* STORY FLOW */
function startStory() {

    document.getElementById("music").play();

    typeText("Wait… don’t go yet 😳💖", 40);

    setTimeout(()=> typeText("I just wanted to tell you something… 🌸", 40), 2000);
    setTimeout(()=> typeText("I really enjoy talking to you 💬", 40), 4000);
    setTimeout(()=> typeText("You make things feel lighter ✨", 40), 6000);
    setTimeout(()=> typeText("And honestly… 😳", 40), 8000);
    setTimeout(()=> typeText("You became someone I genuinely care about 💖", 40), 10000);

    setTimeout(()=>{
        document.getElementById("finalScreen").style.display = "flex";
    }, 13000);
}

/* NO BUTTON RUN AWAY */
let noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", () => {
    noBtn.style.position = "absolute";
    noBtn.style.left = Math.random()*80 + "vw";
    noBtn.style.top = Math.random()*80 + "vh";
});

/* HEARTS */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (20 + Math.random()*20) + "px";
    document.body.appendChild(heart);
    setTimeout(()=> heart.remove(), 6000);
}, 200);

/* FLOWERS */
setInterval(() => {
    let flower = document.createElement("div");
    flower.className = "flower";
    flower.innerHTML = "🌸";
    flower.style.left = Math.random()*100 + "vw";
    flower.style.fontSize = (20 + Math.random()*20) + "px";
    document.body.appendChild(flower);
    setTimeout(()=> flower.remove(), 8000);
}, 600);

</script>

</body>
</html>
