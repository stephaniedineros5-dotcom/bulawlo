<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', cursive;
    background: linear-gradient(135deg, #ffd1dc, #fbc2eb, #a18cd1);
    overflow: hidden;
}

/* CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    position: relative;
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    max-width: 360px;
    z-index: 10;
}

/* BUTTONS */
.btns {
    display: flex;
    justify-content: center;
    gap: 10px;
}

button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

.yes {
    background: linear-gradient(45deg,#ff4d6d,#ff8fab);
    color: white;
}

.no {
    background: #eee;
}

/* FINAL SCREEN */
#finalScreen {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: radial-gradient(circle, #000 40%, #ff758c);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    transition:1.5s;
    color:white;
    text-align:center;
}

.show { opacity:1; }

/* BIG TEXT */
.bigText {
    font-size: 45px;
    animation: pop 1s ease forwards;
}

@keyframes pop {
    0% { transform: scale(0); opacity:0; }
    100% { transform: scale(1); opacity:1; }
}

/* PETALS */
.petal {
    position:absolute;
    pointer-events:none;
    animation: fall linear infinite;
}

@keyframes fall {
    0% {transform:translateY(-10vh);opacity:0;}
    50% {opacity:1;}
    100% {transform:translateY(110vh);opacity:0;}
}

/* LIGHTS */
.light {
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.6);
    pointer-events:none;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% {transform:translateY(100vh);}
    100% {transform:translateY(-10vh);}
}
</style>
</head>

<body>

<div class="container">
    <div class="card" id="card">
        <h1>Hi 💖</h1>
        <p>You make my days brighter 🌸</p>

        <p><b>Can I tell you something? 😊</b></p>

        <div class="btns">
            <button class="yes" onclick="startStory()">Yes 💖</button>
            <button class="no" id="noBtn">No 😅</button>
        </div>

        <p id="result"></p>
    </div>
</div>

<div id="finalScreen">
    <h1 id="finalText"></h1>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b6d9b.mp3">
</audio>

<script>

/* TYPE EFFECT */
function typeText(text, delay) {
    let i = 0;
    let el = document.getElementById("result");
    el.innerHTML = "";

    let interval = setInterval(()=>{
        el.innerHTML += text[i];
        i++;
        if(i>=text.length) clearInterval(interval);
    }, delay);
}

/* STORY */
function startStory(){
    let music = document.getElementById("music");
    music.volume = 0;
    music.play().catch(()=>{});

    /* fade in music */
    let vol = 0;
    let fade = setInterval(()=>{
        if(vol < 0.5){
            vol += 0.02;
            music.volume = vol;
        } else clearInterval(fade);
    },200);

    typeText("Hey... 😳",40);

    setTimeout(()=>typeText("I’ve been meaning to tell you something...",40),2000);
    setTimeout(()=>typeText("and I didn’t really know how to start.",40),4000);

    setTimeout(()=>typeText("But I guess I’ll just say it...",40),6000);
    setTimeout(()=>typeText("you’ve become really important to me.",40),8000);

    setTimeout(()=>typeText("More than I expected, honestly.",40),10000);
    setTimeout(()=>typeText("Talking to you just feels... right 💬",40),12000);

    setTimeout(()=>typeText("You make my days lighter ✨",40),14000);
    setTimeout(()=>typeText("and somehow... better.",40),16000);

    setTimeout(()=>typeText("And I don’t say this a lot but...",40),18000);
    setTimeout(()=>typeText("I’m really glad I met you 💖",40),20000);

    setTimeout(showFinal,23000);
}

/* FINAL */
function showFinal(){
    let final = document.getElementById("finalScreen");
    let text = document.getElementById("finalText");

    final.classList.add("show");

    let lines = [
        "So yeah...",
        "this might be a little unexpected...",
        "but I just wanted you to know",
        "you matter to me 💖",
        "a lot more than you think",
        "and I hope...",
        "you stay in my life 😊"
    ];

    let i=0;

    function next(){
        if(i < lines.length){
            text.innerHTML = lines[i];
            i++;
            setTimeout(next,2200);
        } else {
            setTimeout(()=>{
                text.innerHTML = "💖 Stay with me 💖";
                text.className = "bigText";

                /* bonus line */
                setTimeout(()=>{
                    let extra = document.createElement("p");
                    extra.innerText = "…because I really like you 😳";
                    extra.style.marginTop = "20px";
                    document.getElementById("finalScreen").appendChild(extra);
                },2500);

            },2000);
        }
    }

    next();
}

/* NO BUTTON (SMART 😈) */
let btn = document.getElementById("noBtn");
let card = document.getElementById("card");
let result = document.getElementById("result");

let clicks = 0;

btn.addEventListener("click", (e)=>{
    e.preventDefault();
    clicks++;

    let rect = card.getBoundingClientRect();
    let range = 150;

    btn.style.position = "fixed";
    btn.style.left = rect.left + (Math.random()*range*2-range) + "px";
    btn.style.top = rect.top + (Math.random()*range*2-range) + "px";

    if(clicks==1) result.innerText="Are you sure? 😏";
    else if(clicks==2) result.innerText="Really? 😂";
    else if(clicks==3) result.innerText="You’re persistent 😳";
    else if(clicks>=4){
        result.innerText="You’re not catching me 😜";
        btn.style.transform="scale(0.6)";
    }
});

/* PETALS */
setInterval(()=>{
    let p=document.createElement("div");
    p.className="petal";
    p.innerHTML="🌸";
    p.style.left=Math.random()*100+"vw";
    p.style.fontSize=(20+Math.random()*20)+"px";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),8000);
},300);

/* LIGHTS */
setInterval(()=>{
    let l=document.createElement("div");
    l.className="light";
    l.style.left=Math.random()*100+"vw";
    l.style.width=l.style.height=(5+Math.random()*10)+"px";
    document.body.appendChild(l);
    setTimeout(()=>l.remove(),6000);
},500);

let attempts = 0;

function checkPin(){
    let val = document.getElementById("pin").value;

    if(val==="143"){
        document.getElementById("pinScreen").classList.remove("show");
        showFinal();
    } else {
        attempts++;

        if(attempts==1){
            document.getElementById("hint").innerText="Hint: 1=I 4=Love 3=You 😳";
        } else if(attempts==2){
            alert("Close 😏 try again");
        } else {
            alert("Grabe ka 😭 focus ka nga hahaha");
        }
    }
}

/* FINAL CINEMATIC */
function showFinal(){
    let final = document.getElementById("finalScreen");
    let text = document.getElementById("finalText");

    final.classList.add("show");

    let lines = [
        "So yeah...",
        "I really appreciate you 💖",
        "Like... a lot 😳",
        "And I hope...",
        "you stay in my life 😊"
    ];

    let i=0;

    function nextLine(){
        if(i<lines.length){
            text.innerHTML=lines[i];
            text.classList.add("glow");
            i++;
            setTimeout(nextLine,2000);
        } else {
            launchHearts();
        }
    }

    nextLine();
}

/* NO BUTTON (EVOLVING 😈) */
let btn = document.getElementById("noBtn");

btn.addEventListener("mouseover",()=>{
    noClicks++;

    let maxX = window.innerWidth - btn.offsetWidth;
    let maxY = window.innerHeight - btn.offsetHeight;

    let x = Math.random()*maxX;
    let y = Math.random()*maxY;

    btn.style.position="fixed";
    btn.style.left=x+"px";
    btn.style.top=y+"px";

    if(noClicks==3){
        document.getElementById("result").innerText="You really trying to press no? 😏";
    }
});

/* hearts */
function launchHearts(){
    setInterval(()=>{
        let h=document.createElement("div");
        h.className="heart";
        h.innerHTML="💖";
        h.style.left=Math.random()*100+"vw";
        h.style.fontSize=(20+Math.random()*20)+"px";
        document.body.appendChild(h);

        setTimeout(()=>h.remove(),6000);
    },200);
}


    

</script>

</body>
</html>
