<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', cursive;
    background: linear-gradient(135deg, #ffd1dc, #fbc2eb, #a18cd1);
    overflow: hidden;
}

/* CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    position: relative;
    background: rgba(255,255,255,0.3);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    max-width: 350px;
    z-index: 10;
}

/* BUTTONS */
.btns {
    display: flex;
    justify-content: center;
    gap: 10px;
}

button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

.yes {
    background: linear-gradient(45deg,#ff4d6d,#ff8fab);
    color: white;
}

.no {
    background: #eee;
    position: relative;
}

/* FINAL SCREEN */
#finalScreen {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    transition:1.5s;
    color:white;
    text-align:center;
}

.show { opacity:1; }

/* BIG FINAL TEXT */
.bigText {
    font-size: 42px;
    animation: pop 1s ease forwards;
}

@keyframes pop {
    0% { transform: scale(0); opacity:0; }
    100% { transform: scale(1); opacity:1; }
}

/* LIGHTS */
.light {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.6);
    pointer-events: none;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<div class="container">
    <div class="card" id="card">
        <h1>Hi 💖</h1>
        <p>You make my days brighter 🌸</p>

        <p><b>Can I tell you something? 😊</b></p>

        <div class="btns">
            <button class="yes" onclick="startStory()">Yes 💖</button>
            <button class="no" id="noBtn">No 😅</button>
        </div>

        <p id="result"></p>
    </div>
</div>

<!-- FINAL -->
<div id="finalScreen">
    <h1 id="finalText"></h1>
</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b6d9b.mp3">
</audio>

<script>

/* TEXT EFFECT */
function typeText(text, delay) {
    let i = 0;
    let el = document.getElementById("result");
    el.innerHTML = "";

    let interval = setInterval(()=>{
        el.innerHTML += text[i];
        i++;
        if(i>=text.length) clearInterval(interval);
    }, delay);
}

/* STORY (ENGLISH 💖) */
function startStory(){
    document.getElementById("music").play().catch(()=>{});

    typeText("Wait... 😳",40);

    setTimeout(()=>typeText("Can I be honest with you for a moment?",40),2000);
    setTimeout(()=>typeText("I didn’t expect you to become this important to me...",40),4000);
    setTimeout(()=>typeText("but somehow, you did.",40),6000);
    setTimeout(()=>typeText("And I’m really glad you did 😊",40),8000);

    setTimeout(()=>typeText("Talking to you feels different...",40),10000);
    setTimeout(()=>typeText("in a good way.",40),12000);
    setTimeout(()=>typeText("You make things feel lighter... and happier ✨",40),14000);

    setTimeout(()=>typeText("And honestly...",40),16000);
    setTimeout(()=>typeText("I really like having you in my life 💖",40),18000);

    setTimeout(showFinal,21000);
}

/* FINAL (CINEMATIC 🎬) */
function showFinal(){
    let final = document.getElementById("finalScreen");
    let text = document.getElementById("finalText");

    final.classList.add("show");

    let lines = [
        "So yeah...",
        "I just wanted to tell you that 💖",
        "I really appreciate you",
        "more than you probably realize 😳",
        "and I hope...",
        "you stay in my life for a long time 😊"
    ];

    let i=0;

    function next(){
        if(i < lines.length){
            text.innerHTML = lines[i];
            i++;
            setTimeout(next,2000);
        } else {
            setTimeout(()=>{
                text.innerHTML = "💖 Stay with me 💖";
                text.classList.add("bigText");
            },2000);
        }
    }

    next();
}

/* NO BUTTON (OUTSIDE CARD BUT NEAR 😈) */
let btn = document.getElementById("noBtn");
let card = document.getElementById("card");
let result = document.getElementById("result");

let clicks = 0;

btn.addEventListener("click", (e) => {
    e.preventDefault();
    clicks++;

    let rect = card.getBoundingClientRect();
    let range = 150;

    let x = rect.left + (Math.random()*range*2 - range);
    let y = rect.top + (Math.random()*range*2 - range);

    btn.style.position = "fixed";
    btn.style.left = x + "px";
    btn.style.top = y + "px";

    if(clicks == 1){
        result.innerText = "No? Are you sure? 😏";
    }
    else if(clicks == 2){
        result.innerText = "Wow... really? 😂";
    }
    else if(clicks == 3){
        result.innerText = "Come on, try again 😈";
    }
    else if(clicks >= 4){
        result.innerText = "You’re not catching me that easily 😜";
        btn.style.transform = "scale(0.6)";
    }
});

/* LIGHTS */
setInterval(()=>{
    let l=document.createElement("div");
    l.className="light";
    l.style.left=Math.random()*100+"vw";
    l.style.width=l.style.height=(5+Math.random()*10)+"px";
    document.body.appendChild(l);

    setTimeout(()=>l.remove(),6000);
},500);

</script>

</body>
</html>
