<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special 💖</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',cursive;
    background:linear-gradient(135deg,#ffd1dc,#fbc2eb,#a18cd1);
    overflow:hidden;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* FORM */
.card{
    background:rgba(255,255,255,0.9);
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
    max-width:350px;

    position:relative;
    z-index:1;

    animation:wave 6s ease-in-out infinite;
}

@keyframes wave{
    0%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
    100%{transform:translateY(0);}
}

button{
    padding:10px 20px;
    border-radius:20px;
    border:none;
    margin:10px;
    cursor:pointer;
    font-weight:bold;
}

.yes{background:#ff4d6d;color:white;}
.no{background:#ddd;}

/* SCREENS (HIGH PRIORITY) */
#pinScreen, #finalScreen{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:black;
    color:white;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;

    z-index:9999; /* ✅ ALWAYS ON TOP */
}

#finalText{
    font-size:28px;
    max-width:80%;
}

.bigText{
    font-size:45px;
}

.heart{
    position:absolute;
    animation:floatUp 6s linear infinite;
}

@keyframes floatUp{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<div class="container">
    <div class="card" id="card">
        <h1>Hi, Bulawlo 💖</h1>
        <p>You make my days brighter 🌸</p>

        <p><b>Can I make you smile today? 😊</b></p>
        
        <button class="yes" onclick="startStory()">Yes 💖</button>
        <button class="no" id="noBtn">No 😅</button>

        <p id="result"></p>
    </div>
</div>

<div id="pinScreen">
    <h2>🔐 Enter PIN</h2>
    <p id="hint">(Hint: our special number)</p>
    <input id="pin" type="password">
    <button onclick="checkPin()">Enter</button>
</div>

<div id="finalScreen">
    <h1 id="finalText"></h1>
</div>

<script>

/* STORY */
function startStory(){
    let r=document.getElementById("result");
    let card=document.getElementById("card");

    let msgs=[
        "Wait… don’t go yet 😳",
        "I want to tell you something...",
        "and I hope you listen...",
        "because this means a lot to me 💖"
    ];

    let i=0;
    function next(){
        if(i<msgs.length){
            r.innerText=msgs[i];
            i++;
            setTimeout(next,2000);
        }else{
            card.style.display="none"; /* ✅ HIDE FORM */
            document.getElementById("pinScreen").style.display="flex";
        }
    }
    next();
}

/* PIN */
let attempts=0;

function checkPin(){
    let val=document.getElementById("pin").value;

    if(val==="143"){
        document.getElementById("pinScreen").style.display="none";
        showFinal();
    }else{
        attempts++;
        if(attempts==1){
            document.getElementById("hint").innerText="Hint: 1=I 4=Love 3=You 😳";
        }else{
            alert("Try again 😅");
        }
    }
}

/* FINAL MESSAGE */
function showFinal(){
    let f=document.getElementById("finalScreen");
    let text=document.getElementById("finalText");

    f.style.display="flex";

    let lines=[
        "Hey...",
        "I’ve been wanting to say this for a while...",
        "You became someone really important to me.",
        "You make my days better.",
        "You make me smile.",
        "And I don’t want to hide it anymore...",
        "I love you 💖",
        "Not just a little...",
        "but more than I expected.",
        "So please...",
        "stay with me a little longer...",
        "luv yah 💖"
    ];

    let i=0;

    function next(){
        if(i<lines.length){
            text.innerHTML=lines[i];
            i++;
            setTimeout(next,2000);
        }else{
            text.className="bigText";
        }
    }

    next();
}

/* NO BUTTON */
let btn=document.getElementById("noBtn");
let card=document.getElementById("card");
let result=document.getElementById("result");

btn.style.position="fixed";

let messages=[
    "Are you sure? 😢",
    "That hurts 💔",
    "Even just a little? 🥺",
    "Please? 😭",
    "Come on 😅"
];

let msgIndex=0;

btn.addEventListener("mouseover", moveButton);
btn.addEventListener("touchstart", moveButton);

function moveButton(){
    result.innerText = messages[msgIndex];
    msgIndex = (msgIndex + 1) % messages.length;

    let rect = card.getBoundingClientRect();
    let distance = 70;

    let positions = [
        {x: rect.left - distance, y: rect.top},
        {x: rect.right + distance, y: rect.top},
        {x: rect.left, y: rect.top - distance},
        {x: rect.left, y: rect.bottom + distance}
    ];

    let pos = positions[Math.floor(Math.random()*positions.length)];

    btn.style.left = pos.x + "px";
    btn.style.top = pos.y + "px";
}

/* HEARTS */
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(20+Math.random()*20)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},300);

</script>

</body>
</html>
