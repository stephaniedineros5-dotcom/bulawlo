<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Sayang 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', cursive;
    background: linear-gradient(135deg, #ffd1dc, #fbc2eb, #a18cd1);
    overflow: hidden;
}

/* CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    max-width: 360px;
}

/* BUTTONS */
.btns {
    display: flex;
    justify-content: center;
    gap: 10px;
}

button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.yes {
    background: #ff4d6d;
    color: white;
}

.no {
    background: #eee;
}

/* PIN SCREEN */
#pinScreen {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* INPUT */
input {
    padding:10px;
    border-radius:10px;
    border:none;
    text-align:center;
    margin-top:10px;
}

/* FINAL SCREEN */
#finalScreen {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    color:white;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex-direction:column;
}

/* TEXT */
#finalText {
    font-size: 28px;
    max-width: 80%;
    transition: all 1s ease;
}

.bigText {
    font-size: 42px;
    animation: pop 1s ease forwards;
}

@keyframes pop {
    0% { transform: scale(0); opacity:0; }
    100% { transform: scale(1); opacity:1; }
}

</style>
</head>

<body>

<div class="container">
    <div class="card" id="card">
        <h1>Hi 💖</h1>
        <p>Can I tell you something?</p>

        <div class="btns">
            <button onclick="startStory()">Yes</button>
            <button id="noBtn">No</button>
        </div>

        <p id="result"></p>
    </div>
</div>

<!-- PIN -->
<div id="pinScreen">
    <h2>🔐 Enter PIN</h2>
    <p>(Hint: our special number)</p>
    <input type="password" id="pinInput">
    <button onclick="checkPin()">Enter</button>
    <p id="pinMsg"></p>
</div>

<!-- FINAL -->
<div id="finalScreen">
    <h1 id="finalText"></h1>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b6d9b.mp3">
</audio>

<script>

/* STORY */
function startStory(){
    document.getElementById("music").play().catch(()=>{});
    let r = document.getElementById("result");

    let msgs = [
        "Hey...",
        "I’ve been wanting to tell you something...",
        "and I didn’t know how...",
        "but here I am 😳",
        "You became important to me...",
        "more than I expected 💖"
    ];

    let i=0;
    function next(){
        if(i<msgs.length){
            r.innerText=msgs[i];
            i++;
            setTimeout(next,2000);
        } else {
            document.getElementById("pinScreen").style.display="flex";
        }
    }
    next();
}

/* PIN */
function checkPin(){
    let pin = document.getElementById("pinInput").value;
    let msg = document.getElementById("pinMsg");

    if(pin === "143"){
        document.getElementById("pinScreen").style.display="none";
        showFinal();
    } else {
        msg.innerText="Wrong... try again 😳";
    }
}

/* FINAL */
function showFinal(){
    let f = document.getElementById("finalScreen");
    let text = document.getElementById("finalText");

    f.style.display="flex";

    let lines = [
        "Hey...",
        "",
        "I think this is the part where I stop hiding things.",
        "",
        "Because the truth is...",
        "",
        "I didn’t just fall a little.",
        "",
        "I fell for you.",
        "",
        "I love you. 💖",
        "",
        "Not just for who you are...",
        "but for how you make me feel.",
        "",
        "You make everything feel lighter.",
        "You make everything feel right.",
        "",
        "And if I’m being honest...",
        "",
        "I don’t want this to end.",
        "",
        "I want you.",
        "",
        "I want us.",
        "",
        "So please...",
        "",
        "just stay with me a little longer...",
        "",
        "Sayang...",
        "",
        "luv yah 💖"
    ];

    let i=0;

    function next(){
        if(i<lines.length){
            text.innerHTML=lines[i];
            i++;
            setTimeout(next,2300);
        } else {
            text.className="bigText";
        }
    }

    next();
}

/* NO BUTTON (HOVER ILAG 😈) */
let btn=document.getElementById("noBtn");
let card=document.getElementById("card");

btn.addEventListener("mouseover",()=>{
    let rect=card.getBoundingClientRect();
    btn.style.position="fixed";
    btn.style.left=rect.left + Math.random()*200+"px";
    btn.style.top=rect.top + Math.random()*200+"px";
});

</script>

</body>
</html>
