<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', cursive;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
}

/* Container */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.card {
    background: rgba(255,255,255,0.9);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    max-width: 350px;
    animation: float 3s ease-in-out infinite;
}

h1 { color: #ff4d6d; }
p { color: #444; }

button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    margin: 10px;
    cursor: pointer;
}

.yes { background: #ff4d6d; color: white; }
.no { background: #ddd; }

/* FINAL SCREEN */
#finalScreen {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: none;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    flex-direction: column;
}

#finalScreen h1 {
    font-size: 28px;
}

/* Hearts */
.heart {
    position: absolute;
    color: #ff4d6d;
    animation: floatUp 6s linear infinite;
}

/* Flowers */
.flower {
    position: absolute;
    animation: fall 8s linear infinite;
}

/* Confetti */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    animation: fall 3s linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(100vh); opacity:0;}
    50% {opacity:1;}
    100% {transform: translateY(-10vh); opacity:0;}
}

@keyframes fall {
    0% {transform: translateY(-10vh);}
    100% {transform: translateY(110vh);}
}

@keyframes float {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
}
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h1>Hi Bulawlo 💖</h1>
        <p>You make my days a little brighter 🌸✨</p>

        <p><b>Can I make you smile today? 😊</b></p>

        <button class="yes" onclick="startStory()">Yes 💖</button>
        <button class="no" id="noBtn">No 😅</button>

        <p id="result"></p>
    </div>
</div>

<!-- FINAL SCREEN -->
<div id="finalScreen">
    <h1>
        💖 I’m so grateful that I met you 💖 <br><br>
        you mean more to me than you probably realize 😊
    </h1>
    <p>✨ Thank you for existing ✨</p>
</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>

/* Typing effect */
function typeText(text, delay) {
    let i = 0;
    let result = document.getElementById("result");
    result.innerHTML = "";

    let interval = setInterval(() => {
        result.innerHTML += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
    }, delay);
}

/* Story */
function startStory() {

    let music = document.getElementById("music");
    music.play().catch(()=>{});

    typeText("Wait… don’t go yet 😳💖", 40);

    setTimeout(()=> typeText("I just wanted to tell you something… 🌸", 40), 2000);
    setTimeout(()=> typeText("I really enjoy talking to you 💬", 40), 4000);
    setTimeout(()=> typeText("You make things feel lighter ✨", 40), 6000);
    setTimeout(()=> typeText("And honestly… 😳", 40), 8000);
    setTimeout(()=> typeText("You became someone I genuinely care about 💖", 40), 10000);

    setTimeout(()=>{
        document.getElementById("finalScreen").style.display = "flex";
        launchConfetti();
    }, 13000);
}

/* NO BUTTON FIX */
let noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 50);

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

/* Hearts */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (20 + Math.random()*20) + "px";
    document.body.appendChild(heart);
    setTimeout(()=> heart.remove(), 6000);
}, 200);

/* Flowers */
setInterval(() => {
    let flower = document.createElement("div");
    flower.className = "flower";
    flower.innerHTML = "🌸";
    flower.style.left = Math.random()*100 + "vw";
    flower.style.fontSize = (20 + Math.random()*20) + "px";
    document.body.appendChild(flower);
    setTimeout(()=> flower.remove(), 8000);
}, 600);

/* Confetti */
function launchConfetti() {
    for (let i = 0; i < 80; i++) {
        let confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.style.left = Math.random()*100 + "vw";
        confetti.style.background = ["#fff","#ff4d6d","#ffd1dc"][Math.floor(Math.random()*3)];
        document.body.appendChild(confetti);

        setTimeout(()=> confetti.remove(), 3000);
    }
}
</script>

</body>
</html>
