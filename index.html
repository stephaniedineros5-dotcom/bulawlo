<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special 💖</title>

<style>

/* BACKGROUND */
body {
    margin: 0;
    font-family: 'Segoe UI', cursive;
    background: linear-gradient(135deg, #ffd1dc, #fbc2eb, #a18cd1);
    overflow: hidden;
}

/* CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    position: relative;
    background: rgba(255,255,255,0.3);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    max-width: 350px;
    position: relative;
    z-index: 10;
}

/* TEXT */
h1 { color: #ff4d6d; }
p { color: #333; }

/* BUTTONS */
.btns {
    display: flex;
    justify-content: center;
    gap: 10px;
}

button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

.yes {
    background: linear-gradient(45deg,#ff4d6d,#ff8fab);
    color: white;
}

.no {
    background: #eee;
    position: relative;
}

/* FINAL SCREEN */
#finalScreen {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: linear-gradient(135deg,#ffafbd,#ffc3a0);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    transition:1.5s;
    color:white;
    text-align:center;
}

.show { opacity:1; }

/* GLOW */
.glow {
    animation: glow 2s infinite alternate;
}
@keyframes glow {
    from {text-shadow:0 0 10px #fff;}
    to {text-shadow:0 0 25px #fff;}
}

.flower, .light {
    position: absolute;
    pointer-events: none; /* 🔥 eto yung fix */
}
}
@keyframes fall {
    0% { transform: translateY(-10vh); opacity:0; }
    50% { opacity:1; }
    100% { transform: translateY(110vh); opacity:0; }
}

/* LIGHTS */
.light {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.6);
    animation: floatUp 6s linear infinite;
}
@keyframes floatUp {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

</style>
</head>

<body>

<div class="container">
    <div class="card" id="card">
        <h1>Hi 💖</h1>
        <p>You make my days brighter 🌸</p>

        <p><b>Can I tell you something? 😊</b></p>

        <div class="btns">
            <button class="yes" onclick="startStory()">Yes 💖</button>
            <button class="no" id="noBtn">No 😅</button>
        </div>

        <p id="result"></p>
    </div>
</div>

<!-- FINAL -->
<div id="finalScreen">
    <h1 id="finalText" class="glow"></h1>
</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b6d9b.mp3">
</audio>

<script>

function typeText(text, delay) {
    let i = 0;
    let el = document.getElementById("result");
    el.innerHTML = "";

    let interval = setInterval(()=>{
        el.innerHTML += text[i];
        i++;
        if(i>=text.length) clearInterval(interval);
    }, delay);
}

/* STORY (MAS MAHABA NA 💖) */
function startStory(){
    document.getElementById("music").play().catch(()=>{});

    typeText("Wait... 😳",40);

    setTimeout(()=>typeText("Before anything else...",40),2000);
    setTimeout(()=>typeText("Can I be honest with you for a bit?",40),4000);
    setTimeout(()=>typeText("I didn’t expect we’d get this close...",40),6000);
    setTimeout(()=>typeText("but somehow, here we are 😊",40),8000);

    setTimeout(()=>typeText("And I’m actually really glad...",40),10000);
    setTimeout(()=>typeText("because talking to you feels different 💬",40),12000);
    setTimeout(()=>typeText("like... lighter, easier, happier ✨",40),14000);

    setTimeout(()=>typeText("You became someone I look forward to talking to",40),16000);
    setTimeout(()=>typeText("and I didn’t even notice when it started 😳",40),18000);

    setTimeout(()=>typeText("So yeah...",40),20000);
    setTimeout(()=>typeText("I just wanted you to know that 💖",40),22000);

    setTimeout(showFinal,24000);
}

/* FINAL CINEMATIC (HINDI NA BITIN 🎬) */
function showFinal(){
    let final = document.getElementById("finalScreen");
    let text = document.getElementById("finalText");

    final.classList.add("show");

    let lines = [
        "And maybe this is random...",
        "but I’m really grateful I met you 💖",
        "you became someone important to me",
        "more than you probably realize 😳",
        "and honestly...",
        "I don’t want to lose this",
        "I don’t want to lose you",
        "so if it’s okay...",
        "stay with me a little longer? 😊"
    ];

    let i=0;

    function next(){
        if(i<lines.length){
            text.innerHTML=lines[i];
            i++;
            setTimeout(next,2500);
        }
    }

    next();
}

/* NO BUTTON (LEVELING SYSTEM 😈) */
let btn = document.getElementById("noBtn");
let card = document.getElementById("card");
let result = document.getElementById("result");

let clicks = 0;

btn.addEventListener("click", (e) => {
    e.preventDefault();
    clicks++;

    let maxX = card.clientWidth - btn.offsetWidth;
    let maxY = card.clientHeight - btn.offsetHeight;

    let x = Math.random() * maxX;
    let y = Math.random() * maxY;

    btn.style.position = "absolute";
    btn.style.left = x + "px";
    btn.style.top = y + "px";

    /* personality 😏 */
    if(clicks == 1){
        result.innerText = "No? sure ka? 😏";
    }
    else if(clicks == 2){
        result.innerText = "Grabe ka naman 😂";
    }
    else if(clicks == 3){
        result.innerText = "Try mo pa ulit... di mo yan mahuhuli 😈";
    }
    else if(clicks == 4){
        result.innerText = "Okay, medyo determined ka ah 😳";
    }
    else if(clicks == 5){
        result.innerText = "Sige... pahihirapan na kita 😜";
        btn.style.transform = "scale(0.7)";
    }
    else if(clicks >= 6){
        result.innerText = "Ayan na... di mo na talaga yan ma-click 😂";
        btn.style.transform = "scale(0.5)";
    }
});
</script>

</body>
</html>
