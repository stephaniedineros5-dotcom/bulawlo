
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Sayang 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', cursive;
    background: linear-gradient(135deg, #ffd1dc, #fbc2eb, #a18cd1);
    overflow: hidden;
}

/* CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    position: relative;
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    max-width: 360px;
    z-index: 10;
}

/* BUTTONS */
.btns {
    display: flex;
    justify-content: center;
    gap: 10px;
}

button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

.yes {
    background: linear-gradient(45deg,#ff4d6d,#ff8fab);
    color: white;
}

.no {
    background: #eee;
}

/* FINAL SCREEN */
#finalScreen {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: radial-gradient(circle, #000 40%, #ff758c);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    transition:1.5s;
    color:white;
    text-align:center;
}

/* TEXT STYLE */
#finalText {
    font-size: 28px;
    max-width: 80%;
    transition: all 1s ease;
}

.show { opacity:1; }

.bigText {
    font-size: 45px;
    animation: pop 1s ease forwards;
}

@keyframes pop {
    0% { transform: scale(0); opacity:0; }
    100% { transform: scale(1); opacity:1; }
}

/* PETALS */
.petal {
    position:absolute;
    pointer-events:none;
    animation: fall linear infinite;
}

@keyframes fall {
    0% {transform:translateY(-10vh);opacity:0;}
    50% {opacity:1;}
    100% {transform:translateY(110vh);opacity:0;}
}

/* LIGHTS */
.light {
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.6);
    pointer-events:none;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% {transform:translateY(100vh);}
    100% {transform:translateY(-10vh);}
}
</style>
</head>

<body>

<div class="container">
    <div class="card" id="card">
        <h1>Hi 💖</h1>
        <p>You make my days brighter 🌸</p>
        <p><b>Can I tell you something? 😊</b></p>

        <div class="btns">
            <button class="yes" onclick="startStory()">Yes 💖</button>
            <button class="no" id="noBtn">No 😅</button>
        </div>

        <p id="result"></p>
    </div>
</div>

<div id="finalScreen">
    <h1 id="finalText"></h1>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b6d9b.mp3">
</audio>

<script>

/* TYPE TEXT */
function typeText(text, delay) {
    let i = 0;
    let el = document.getElementById("result");
    el.innerHTML = "";

    let interval = setInterval(()=>{
        el.innerHTML += text[i];
        i++;
        if(i>=text.length) clearInterval(interval);
    }, delay);
}

/* STORY */
function startStory(){
    let music = document.getElementById("music");
    music.volume = 0;
    music.play().catch(()=>{});

    let vol = 0;
    let fade = setInterval(()=>{
        if(vol < 0.6){
            vol += 0.02;
            music.volume = vol;
        } else clearInterval(fade);
    },200);

    typeText("Hey... 😳",40);

    setTimeout(()=>typeText("Can I tell you something I've been keeping for a while?",40),2000);
    setTimeout(()=>typeText("I didn’t really know when it started...",40),5000);
    setTimeout(()=>typeText("but somewhere along the way...",40),8000);
    setTimeout(()=>typeText("you became someone really important to me.",40),11000);
    setTimeout(()=>typeText("Talking to you became my favorite part of the day 💬",40),14000);
    setTimeout(()=>typeText("You make things feel lighter... happier ✨",40),17000);
    setTimeout(()=>typeText("And honestly...",40),20000);
    setTimeout(()=>typeText("I’m really glad I met you 💖",40),23000);

    setTimeout(showFinal,26000);
}

/* FINAL CINEMATIC */
function showFinal(){
    let final = document.getElementById("finalScreen");
    let text = document.getElementById("finalText");

    final.classList.add("show");

    let lines = [
        "Sayang...",
        "I know this might be unexpected...",
        "",
        "but I’ve been wanting to tell you this for a while now.",
        "",
        "You became someone really important to me.",
        "",
        "You make my days better.",
        "You make me smile without trying.",
        "",
        "And I don’t know if you feel the same way...",
        "",
        "but I just want to be honest.",
        "",
        "So here it is...",
        "",
        "Sayang...",
        "",
        "I love you. 💖",
        "",
        "And if it’s okay with you...",
        "I’d love to stay by your side for a long time 😊"
    ];

    let i = 0;

    function showNext(){
        if(i < lines.length){

            if(lines[i] === ""){
                text.innerHTML = "";
            } else {
                text.innerHTML = lines[i];
                text.style.opacity = 0;
                text.style.transform = "translateY(20px)";

                setTimeout(()=>{
                    text.style.opacity = 1;
                    text.style.transform = "translateY(0)";
                },100);
            }

            i++;
            setTimeout(showNext, 2500);
        }
        else {
            setTimeout(()=>{
                text.innerHTML = "💖 Stay with me, Sayang 💖";
                text.className = "bigText";
            },2000);
        }
    }

    showNext();
}

/* NO BUTTON HOVER 😈 */
let btn = document.getElementById("noBtn");
let card = document.getElementById("card");

btn.addEventListener("mouseover", () => {
    let rect = card.getBoundingClientRect();
    let range = 150;

    btn.style.position = "fixed";
    btn.style.left = rect.left + (Math.random()*range*2-range) + "px";
    btn.style.top = rect.top + (Math.random()*range*2-range) + "px";
});

/* PETALS */
setInterval(()=>{
    let p=document.createElement("div");
    p.className="petal";
    p.innerHTML="🌸";
    p.style.left=Math.random()*100+"vw";
    p.style.fontSize=(20+Math.random()*20)+"px";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),8000);
},300);

/* LIGHTS */
setInterval(()=>{
    let l=document.createElement("div");
    l.className="light";
    l.style.left=Math.random()*100+"vw";
    l.style.width=l.style.height=(5+Math.random()*10)+"px";
    document.body.appendChild(l);
    setTimeout(()=>l.remove(),6000);
},500);

</script>

</body>
</html>
