<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', cursive;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
}

/* Container */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.card {
    position: relative;
    background: rgba(255,255,255,0.95);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 15px 50px rgba(0,0,0,0.2);
    max-width: 350px;
    animation: float 3s ease-in-out infinite;
}

h1 { color: #ff4d6d; }
p { color: #444; }

button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    margin: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover { transform: scale(1.1); }

.yes { background: #ff4d6d; color: white; }
.no { background: #ddd; }

/* SCREENS */
.screen {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    pointer-events:none;
    transition:1s;
    color:white;
    text-align:center;
}

.show {
    opacity:1;
    pointer-events:all;
}

#pinScreen { background:pink; }
#finalScreen { background:black; }

/* input */
input {
    padding:10px;
    border-radius:10px;
    border:none;
    text-align:center;
}

/* glow */
.glow {
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {text-shadow:0 0 10px #fff;}
    to {text-shadow:0 0 25px #fff;}
}

/* floating card */
@keyframes float {
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* HEARTS */
.heart {
    position: absolute;
    color: #ff4d6d;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(100vh); opacity:0;}
    50% {opacity:1;}
    100% {transform: translateY(-10vh); opacity:0;}
}

/* FLOWERS */
.flower {
    position: absolute;
    animation: fall 8s linear infinite;
}

@keyframes fall {
    0% {transform: translateY(-10vh);}
    100% {transform: translateY(110vh);}
}

/* CONFETTI */
.confetti {
    position: absolute;
    width: 10px;
    height: 600px;
    animation: fall 3s linear infinite;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h1>Hi, Bulawlo 💖</h1>
        <p>You make my days better 🌸</p>

        <p><b>Can I tell you something? 😊</b></p>

        <button class="yes" onclick="startStory()">Yes 💖</button>
        <button class="no" id="noBtn">No 😅</button>

        <p id="result"></p>
    </div>
</div>

<!-- PIN SCREEN -->
<div id="pinScreen" class="screen">
    <h1>🔒 Enter Secret Code</h1>
    <p id="hint">Hint: important number 😉</p>
    <input type="password" id="pin">
    <button onclick="checkPin()">Unlock 💖</button>
</div>

<!-- FINAL SCREEN -->
<div id="finalScreen" class="screen">
    <h1 id="finalText"></h1>
</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="music.mp3">
</audio>

<script>

let noClicks = 0;

/* typing effect */
function typeText(text, delay) {
    let i = 0;
    let el = document.getElementById("result");
    el.innerHTML = "";

    let interval = setInterval(() => {
        el.innerHTML += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
    }, delay);
}

/* STORY */
function startStory() {
    document.getElementById("music").play().catch(()=>{});

    typeText("Wait... 😳", 40);

    setTimeout(()=>typeText("I just want to say something...",40),2000);
    setTimeout(()=>typeText("I enjoy talking to you 💬",40),4000);
    setTimeout(()=>typeText("You make things lighter ✨",40),6000);
    setTimeout(()=>typeText("And honestly...",40),8000);
    setTimeout(()=>typeText("You matter to me 💖",40),10000);

    setTimeout(()=>{
        document.getElementById("pinScreen").classList.add("show");
    },12000);
}

/* PIN */
let attempts = 0;

function checkPin() {
    let val = document.getElementById("pin").value;

    if (val === "143") {
        document.getElementById("pinScreen").classList.remove("show");
        showFinal();
    } else {
        attempts++;

        if (attempts == 1) {
            document.getElementById("hint").innerText =
                "Hint: 1=I 4=Love 3=You 😳";
        } else {
            alert("Try again 😏");
        }
    }
}

/* FINAL EMOTIONAL MESSAGE */
function showFinal() {
    let final = document.getElementById("finalScreen");
    let text = document.getElementById("finalText");

    final.classList.add("show");

    let lines = [
        "Hey, Sayang 😊...",
        "I just want you to know",
         "how much you mean to me💖",
        "Life feels a little lighter and a lot warmer",
         "because you're in it 😊",
        "No matter what happens..",
        "I'm always here for you..",
         "just like you've always been there for me",
        "And I don’t say that to just anyone.",
        "I hope you stay in my life 😊",
        "even if things get complicated...",
        "even if days gets hard...",
        "No matter where life takes us,",
         "you'll always have a special place in my heart 😊",
        "I will always be grateful that I met you 💖",
         "luvv yahh baobei 😚"
    ];

    let i = 0;

    function nextLine() {
        if (i < lines.length) {
            text.innerHTML = lines[i];
            text.classList.add("glow");
            i++;
            setTimeout(nextLine, 2000);
        } else {
            launchEffects();
        }
    }

    nextLine();
}

/* NO BUTTON FIXED INSIDE CARD */
let btn = document.getElementById("noBtn");
let card = document.querySelector(".card");

btn.addEventListener("mouseover", () => {
    noClicks++;

    let rect = card.getBoundingClientRect();

    let maxX = rect.width - btn.offsetWidth - 40;
    let maxY = rect.height - btn.offsetHeight - 40;

    let x = Math.random() * maxX;
    let y = Math.random() * maxY;

    btn.style.position = "absolute";
    btn.style.left = x + "px";
    btn.style.top = y + "px";

    if (noClicks == 3) {
        document.getElementById("result").innerText =
            "You really trying to press no? 😏";
    }
});

/* HEARTS + FLOWERS + CONFETTI */
function launchEffects() {

    setInterval(() => {
        let h = document.createElement("div");
        h.className = "heart";
        h.innerHTML = "💖";
        h.style.left = Math.random() * 100 + "vw";
        h.style.fontSize = (20 + Math.random() * 20) + "px";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 6000);
    }, 200);

    setInterval(() => {
        let f = document.createElement("div");
        f.className = "flower";
        f.innerHTML = "🌸";
        f.style.left = Math.random() * 100 + "vw";
        f.style.fontSize = (20 + Math.random() * 20) + "px";
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 8000);
    }, 600);

    for (let i = 0; i < 80; i++) {
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.background =
            ["#fff","#ff4d6d","#ffd1dc"][Math.floor(Math.random()*3)];
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3000);
    }
}

</script>

</body>
</html>
