<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special 💖</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',cursive;
    background:linear-gradient(135deg,#ffd1dc,#fbc2eb,#a18cd1);
    overflow:hidden;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    position:relative;
    background:rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
    max-width:350px;
}

/* ✅ FIX BUTTON ALIGNMENT */
.btn-group{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:15px;
}

button{
    padding:12px 22px;
    border-radius:20px;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

.yes{
    background:#ff4d6d;
    color:white;
}

.no{
    background:#ddd;
}

/* SCREENS */
#pinScreen, #finalScreen{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:black;
    color:white;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

#finalText{
    font-size:28px;
    max-width:80%;
}

/* HEARTS */
.heart{
    position:absolute;
    animation:floatUp 6s linear infinite;
}

@keyframes floatUp{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<div class="container">
    <div class="card" id="card">
        <h1>Hi 💖</h1>
        <p>You make my days brighter 🌸</p>

        <p><b>Can I make you smile today? 😊</b></p>

        <!-- ✅ FIX ALIGN -->
        <div class="btn-group">
            <button class="yes" onclick="startStory()">Yes 💖</button>
            <button class="no" id="noBtn">No 😅</button>
        </div>

        <p id="result"></p>
    </div>
</div>

<!-- PIN -->
<div id="pinScreen">
    <h2>🔐 Enter PIN</h2>
    <p id="hint">(Hint: ???)</p> <!-- ✅ HIDDEN -->
    <input id="pin" type="password">
    <button onclick="checkPin()">Enter</button>
</div>

<!-- FINAL -->
<div id="finalScreen">
    <h1 id="finalText"></h1>
</div>

<script>

/* STORY */
function startStory(){
    let r=document.getElementById("result");

    let msgs=[
        "Wait… don’t go yet 😳",
        "I want to tell you something...",
        "And I hope you listen...",
        "Because this means a lot to me 💖"
    ];

    let i=0;
    function next(){
        if(i<msgs.length){
            r.innerText=msgs[i];
            i++;
            setTimeout(next,2000);
        }else{
            document.getElementById("pinScreen").style.display="flex";
        }
    }
    next();
}

/* PIN */
let attempts=0;

function checkPin(){
    let val=document.getElementById("pin").value;

    if(val==="143"){
        document.getElementById("pinScreen").style.display="none";
        showFinal();
    }else{
        attempts++;

        // ✅ SHOW HINT ONLY AFTER WRONG
        if(attempts==1){
            document.getElementById("hint").innerText="Hint: 1 = I, 4 = Love, 3 = You 😳";
        }else{
            alert("Try again 😅");
        }
    }
}

/* FINAL MESSAGE (PAISA-ISA) */
function showFinal(){
    let f=document.getElementById("finalScreen");
    let text=document.getElementById("finalText");

    f.style.display="flex";

    let lines=[
        "Hey...",
        "I’ve been wanting to say this for a while...",
        "You’ve become someone really important to me.",
        "You make my days better.",
        "You make me smile.",
        "And I don’t want to hide it anymore...",
        "I love you 💖",
        "Stay with me a little longer..."
    ];

    let i=0;

    function next(){
        if(i<lines.length){
            text.innerHTML = lines[i];
            i++;
            setTimeout(next,2000);
        }
    }

    next();
}

/* ✅ FIX NO BUTTON (HINDI HARANG) */
let btn=document.getElementById("noBtn");
let card=document.getElementById("card");

btn.style.position="absolute";

btn.addEventListener("mouseover", moveButton);
btn.addEventListener("touchstart", moveButton);

function moveButton(){
    let maxX = card.clientWidth - btn.offsetWidth - 20;
    let maxY = card.clientHeight - btn.offsetHeight - 20;

    let x = Math.random() * maxX;
    let y = Math.random() * maxY;

    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

/* HEARTS */
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(20+Math.random()*20)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},300);

</script>

</body>
</html>
