<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', cursive;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
}

/* 💌 Container */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 💖 Card */
.card {
    background: rgba(255,255,255,0.9);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    max-width: 350px;
    animation: float 3s ease-in-out infinite;
}

h1 {
    color: #ff4d6d;
}

p {
    color: #444;
}

/* 💖 Buttons */
button {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    margin: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.yes {
    background: #ff4d6d;
    color: white;
}

.no {
    background: #ddd;
}

/* 💖 Floating hearts */
.heart {
    position: absolute;
    color: #ff4d6d;
    animation: floatUp 6s linear infinite;
}

/* 🌸 Flowers */
.flower {
    position: absolute;
    animation: fall 8s linear infinite;
}

/* 💫 Animations */
@keyframes floatUp {
    0% {transform: translateY(100vh); opacity:0;}
    50% {opacity:1;}
    100% {transform: translateY(-10vh); opacity:0;}
}

@keyframes fall {
    0% {transform: translateY(-10vh);}
    100% {transform: translateY(110vh);}
}

@keyframes float {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
}
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h1>Hi 💖</h1>
        <p>
            I just want to say... you make my days a little brighter 🌸✨  
        </p>

        <p><b>Can I make you smile today? 😊</b></p>

        <button class="yes" onclick="yesClick()">Yes 💖</button>
        <button class="no" id="noBtn">No 😅</button>

        <p id="result"></p>
    </div>
</div>

<!-- 🎶 Music -->
<audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
function yesClick() {
    document.getElementById("result").innerHTML =
    "Aww 🥺💖 Thank you... that means a lot to me 💕";
}

/* 😏 NO button umiilag */
let noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    noBtn.style.position = "absolute";
    noBtn.style.left = Math.random() * 80 + "vw";
    noBtn.style.top = Math.random() * 80 + "vh";
});

/* 💖 Hearts */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (20 + Math.random()*20) + "px";
    document.body.appendChild(heart);
    setTimeout(()=> heart.remove(), 6000);
}, 300);

/* 🌸 Flowers */
setInterval(() => {
    let flower = document.createElement("div");
    flower.className = "flower";
    flower.innerHTML = "🌸";
    flower.style.left = Math.random()*100 + "vw";
    flower.style.fontSize = (20 + Math.random()*20) + "px";
    document.body.appendChild(flower);
    setTimeout(()=> flower.remove(), 8000);
}, 800);
</script>

</body>
</html>
