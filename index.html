<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special 💖</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',cursive;
    background:linear-gradient(135deg,#ffd1dc,#fbc2eb,#a18cd1);
    overflow:hidden;
}

/* CENTER */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.card{
    position:relative;
    background:rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
    max-width:350px;
    animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(30px);}
    to{opacity:1;transform:translateY(0);}
}

/* BUTTONS */
button{
    padding:12px 22px;
    border-radius:20px;
    border:none;
    margin:10px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{ transform:scale(1.05); }

.yes{
    background:#ff4d6d;
    color:white;
    box-shadow:0 0 10px #ff4d6d;
}

.no{ background:#ddd; }

/* SCREENS */
#pinScreen, #finalScreen{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:black;
    color:white;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    animation:fadeIn 0.8s;
}

#finalText{
    font-size:28px;
    max-width:80%;
    line-height:1.6;
}

/* GLOW TEXT */
.bigText{
    font-size:45px;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px #ff4d6d; }
    to{ text-shadow:0 0 30px #ff99aa, 0 0 50px #ff4d6d; }
}

/* HEARTS */
.heart{
    position:absolute;
    animation:floatUp 6s linear infinite;
}

@keyframes floatUp{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<div class="container">
    <div class="card" id="card">
        <h1>Hi 💖</h1>
        <p>You make my days brighter 🌸</p>

        <p><b>Can I make you smile today? 😊</b></p>

        <button class="yes" onclick="startStory()">Yes 💖</button>
        <button class="no" id="noBtn">No 😅</button>

        <p id="result"></p>
    </div>
</div>

<div id="pinScreen">
    <h2>🔐 Enter PIN</h2>
    <p id="hint">(Hint: 1 = I, 4 = Love, 3 = You)</p>
    <input id="pin" type="password">
    <button onclick="checkPin()">Enter</button>
</div>

<div id="finalScreen">
    <h1 id="finalText"></h1>
</div>

<!-- 🔥 MUSIC -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* 🔊 MUSIC */
function playMusic(){
    let music = document.getElementById("music");
    music.volume = 0.5;
    music.play().catch(()=>{});
}

/* STORY */
function startStory(){
    playMusic();

    let r=document.getElementById("result");

    let msgs=[
        "Wait… don’t go yet 😳",
        "I want to tell you something...",
        "And I hope you listen...",
        "Because this means a lot to me 💖"
    ];

    let i=0;
    function next(){
        if(i<msgs.length){
            r.innerText=msgs[i];
            i++;
            setTimeout(next,2000);
        }else{
            document.getElementById("pinScreen").style.display="flex";
        }
    }
    next();
}

/* PIN */
let attempts=0;

function checkPin(){
    let val=document.getElementById("pin").value;

    if(val==="143"){
        document.getElementById("pinScreen").style.display="none";
        showFinal();
    }else{
        attempts++;
        document.getElementById("hint").innerText="Try again 😅";
    }
}

/* FINAL (TYPE EFFECT 💖) */
function showFinal(){
    let f=document.getElementById("finalScreen");
    let text=document.getElementById("finalText");

    f.style.display="flex";

    let message = "I love you 💖";
    let i=0;

    function type(){
        if(i < message.length){
            text.innerHTML += message.charAt(i);
            i++;
            setTimeout(type,100);
        }else{
            text.classList.add("bigText");
        }
    }

    type();
}

/* NO BUTTON */
let btn=document.getElementById("noBtn");
let card=document.getElementById("card");

btn.style.position="absolute";

btn.addEventListener("mouseover", moveButton);
btn.addEventListener("touchstart", moveButton);

function moveButton(){
    let maxX = card.clientWidth - btn.offsetWidth;
    let maxY = card.clientHeight - btn.offsetHeight;

    btn.style.left = Math.random()*maxX + "px";
    btn.style.top = Math.random()*maxY + "px";
}

/* HEARTS */
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(20+Math.random()*20)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},300);

</script>

</body>
</html>
